<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" rx="44" fill="#1a1a2e"/>

  <!-- Meter body outline -->
  <rect x="48" y="32" width="160" height="192" rx="14" fill="none" stroke="#5a6fd6" stroke-width="6"/>

  <!-- Display -->
  <rect x="64" y="52" width="128" height="64" rx="8" fill="#0d1b2a" stroke="#3a7bd5" stroke-width="3"/>
  <text x="128" y="97" text-anchor="middle" fill="#4a9eff"
        font-size="30" font-family="monospace" font-weight="bold" letter-spacing="2">kWh</text>

  <!-- Divider -->
  <line x1="64" y1="136" x2="192" y2="136" stroke="#2a2a5a" stroke-width="2"/>

  <!-- Phase bars -->
  <rect x="64"  y="148" width="34" height="10" rx="5" fill="#e74c3c"/>
  <rect x="111" y="148" width="34" height="10" rx="5" fill="#f39c12"/>
  <rect x="158" y="148" width="34" height="10" rx="5" fill="#3498db"/>

  <!-- Phase labels -->
  <text x="81"  y="174" text-anchor="middle" fill="#e74c3c" font-size="16" font-family="sans-serif" font-weight="bold">L1</text>
  <text x="128" y="174" text-anchor="middle" fill="#f39c12" font-size="16" font-family="sans-serif" font-weight="bold">L2</text>
  <text x="175" y="174" text-anchor="middle" fill="#3498db" font-size="16" font-family="sans-serif" font-weight="bold">L3</text>

  <!-- Model label -->
  <text x="128" y="212" text-anchor="middle" fill="#4a4a8a"
        font-size="13" font-family="sans-serif" letter-spacing="2">DTSU666</text>
</svg>
